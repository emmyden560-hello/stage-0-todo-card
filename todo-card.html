<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <article data-testid="test-todo-card">
        <header>
            <div>
                <div>
                    <input type="checkbox" data-testid="test-todo-checkbox">
                </div>
                <h2 data-testid="test-todo-title">Frontend Stage 0 Task</h2>
            </div>
            <span data-testid="test-todo-priority">
                <span>🔥</span>
                High
            </span>
        </header>

        <div>
            <p data-testid="test-todo-description">
                Build a todo list card component that is testable and accessible.
            </p>
            <div>
                <div>
                    <span>📅</span>
                    <time data-testid="test-todo-due-date" datetime="2026-03-01T18:00:00Z">Due March 15, 2026</time>
                </div>

                <div data-testid="test-todo-time-remaining">
                    Overdue by 40 days
                </div>
            </div>
        </div>

        <div>
            <div>
                <span>Status</span>
                <span data-testid="test-todo-status">Pending</span>
            </div>

            <div>
                <ul data-testid="test-todo-tags">
                    <li>
                        <span data-testid="text-todo-tag-work">💼Work</span>
                    </li>
                    <li>
                        <span data-testid="text-todo-tag-frontend">✨Frontend</span>
                    </li>
                    <li>
                        <span data-testid="text-todo-tag-urgent">🚨Urgent</span>
                    </li>
                </ul>
            </div>
        </div>

        <footer>
            <button data-testid="test-todo-edit-button">
                <span>✏️</span>
                <span>Edit</span>
            </button>
            <button data-testid="test-todo-delete-button">
                <span>🗑️</span>
                <span>Delete</span>
            </button>
        </footer>
    </article>
</body>

</html>
